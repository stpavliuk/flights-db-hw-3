<!DOCTYPE html>
<html th:replace="~{common/layout :: layout(~{::title}, ~{::header}, ~{::section})}" lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="@{'Flight Load Report: ' + ${flight.getNo()} + ', Departure Date: ' + ${flight.departureDate}}"></title>
</head>
<body>

<div class="container px-10">
  <header th:text="@{'Flight Load Report: ' + ${flight.getNo()} + ', Departure Date: ' + ${flight.departureDate}}"></header>

  <section>
    <div class="d-flex flex-wrap gap-2 mb-3">
      <a th:href="@{/flight}" class="btn btn-outline-secondary">All Flights</a>
      <a th:href="@{'/flight/' + ${flight.id} + '/passenger'}" class="btn btn-outline-secondary">Passengers</a>
    </div>

    <div class="row g-4">
      <div class="col-lg-6">
        <div class="card h-100">
          <div class="card-header bg-body-tertiary fw-semibold">Meals to Load</div>
          <div class="table-responsive">
          <table class="table table-bordered table-hover mb-0">
            <thead class="table-light">
              <tr>
                <th>Meal Type</th>
                <th>Items count</th>
              </tr>
            </thead>
            <tbody>
            <tr th:each="meal : ${mealsToLoad}">
              <td th:text="${meal.mealType}"></td>
              <td th:text="${meal.quantity}"></td>
            </tr>
            </tbody>
          </table>
          </div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="card h-100">
          <div class="card-header bg-body-tertiary fw-semibold">Beverages to Load</div>
          <div class="table-responsive">
          <table class="table table-bordered table-hover mb-0">
            <thead class="table-light">
            <tr>
              <th>Beverage Type</th>
              <th>Items count</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="meal : ${beveragesToLoad}">
              <td th:text="${meal.beverageType}"></td>
              <td th:text="${meal.quantity}"></td>
            </tr>
            </tbody>
          </table>
          </div>
        </div>
      </div>
    </div>

    <div class="d-flex justify-content-end mt-4">
      <a th:href="@{'/flight/' + ${flight.id} + '/meals/load/confirm'}" class="btn btn-primary">Confirm Load Plan</a>
    </div>
  </section>

</div>
</body>
</html>
